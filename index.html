<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="theme-color"
        content="#020814"
    >

    <title>STA CLOCK</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="glitter glitter-one"></div>
    <div class="glitter glitter-two"></div>
    <div class="glitter glitter-three"></div>

    <header class="topbar">

        <div class="brand">
            <span class="brand-star">★</span>
            <span>STA CLOCK</span>
        </div>

        <div class="status">
            PERSONAL TIME SYSTEM
        </div>

    </header>

    <main>

        <section class="hero">

            <p class="eyebrow">
                STANDARD TEMPORAL ANTICIPATION
            </p>

            <div class="clock-card">

                <p class="clock-label">
                    STA TIME
                </p>

                <h1 id="staTime">
                    00:00:00
                </h1>

                <p id="staDate" class="sta-date">
                    -- / -- / ----
                </p>

                <div class="gold-line"></div>

                <div class="local-time">

                    <span>LOCAL TIME</span>

                    <strong id="normalTime">
                        00:00:00
                    </strong>

                </div>

            </div>

            <div class="statement">

                <p>
                    No vivo el tiempo del mundo.
                </p>

                <strong>
                    Vivo el mío.
                </strong>

            </div>

        </section>

    </main>

    <footer>

        <span>BUENOS AIRES SOUL</span>

        <span class="footer-star">★</span>

        <span>MY TIME · MY RULES</span>

    </footer>

    <script src="scripts.js"></script>

</body>

</html>
